# Bawbel Scanner — GitLab CI example
# https://bawbel.io/docs/integrations/gitlab-ci
#
# Findings are uploaded as a SAST report — visible in the
# GitLab Security Dashboard and merge request security widget.

bawbel-scan:
  stage: test
  image: python:3.12-slim

  script:
    - pip install "bawbel-scanner[all]"
    - bawbel scan . --recursive --fail-on-severity high --format sarif

  artifacts:
    reports:
      sast: bawbel-results.sarif
    paths:
      - bawbel-results.sarif
    when: always
    expire_in: 30 days

  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Optional: separate job per stage ─────────────────────────────────────────
#
# stages:
#   - test
#   - security
#
# bawbel-scan:
#   stage: security
#   ...

# ── Optional: only scan changed files ────────────────────────────────────────
