# Bawbel Scanner — pre-commit hook definitions
# https://bawbel.io/docs/integrations/pre-commit
#
# Usage in .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/bawbel/bawbel-integrations
#       rev: v1
#       hooks:
#         - id: bawbel-scan

- id: bawbel-scan
  name: Bawbel Scanner
  description: >
    Scan agentic AI components (SKILL.md, MCP manifests, system prompts)
    for AVE vulnerabilities before they reach production.
  entry: python3 pre-commit/bawbel_pre_commit.py
  language: system
  types_or: [markdown, yaml, json]
  pass_filenames: true

- id: bawbel-scan-all
  name: Bawbel Scanner (all engines)
  description: >
    Scan agentic AI components with all detection engines enabled
    (pattern + YARA + Semgrep + Magika). Slower but more thorough.
  entry: python3 pre-commit/bawbel_pre_commit.py
  language: system
  types_or: [markdown, yaml, json]
  pass_filenames: true
  args: ["--all-engines"]